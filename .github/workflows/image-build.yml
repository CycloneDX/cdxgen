name: Image build

# This workflow CAN NOT be called directly. It is currently used by:
# - build-images.yml
# - build-rolling-image.yml
#
# If any changes are made to this workflow, specifically with any inputs, make
# sure to check/update the above workflows!

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      latest:
        required: true
        type: boolean

env:
  REPO: ghcr.io
  TAG: v11
  TEAM: cyclonedx


# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  image:
    permissions:
      packages: write  # needed for publishing images on GH package registry
    runs-on: ${{ fromJSON(inputs.image).runner || 'ubuntu-24.04' }}
    steps:
      - name: buildx test
        run: |
          docker buildx build --network=host --progress=plain --no-cache \
            --platform linux/amd64 \
            -<<EOF
          FROM alpine
          RUN apk add --no-cache curl
          RUN curl -v http://mini-dev-1:8081/repository/npm/
          EOF
