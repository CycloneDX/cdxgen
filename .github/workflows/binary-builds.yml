name: Binary builds

on:
  pull_request:
    paths:
      - '.github/workflows/binary-builds.yml'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.test.js'
  push:
    branches:
      - release/*
    tags:
      - 'v*'
    paths:
      - '.github/workflows/binary-builds.yml'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.test.js'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  musl-builds-arm64:
    if: github.repository == 'CycloneDX/cdxgen'
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-22.04-arm' ]
        include:
          - os: ubuntu-22.04-arm
            build: |
              rm -rf ci contrib tools_config
              pnpm --package=@appthreat/caxa dlx caxa --input . --output "cdxgen" -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/cdxgen.js"
              chmod +x cdxgen
              ./cdxgen --help
              sha256sum cdxgen > cdxgen.sha256
              rm -rf node_modules
              pnpm install --config.strict-dep-builds=true --virtual-store-dir node_modules/pnpm --no-optional --prod --package-import-method copy --frozen-lockfile
              pnpm --package=@appthreat/caxa dlx caxa --input . --output "cdxgen-slim" -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/cdxgen.js"
              chmod +x cdxgen-slim
              ./cdxgen-slim --version
              sha256sum cdxgen-slim > cdxgen-slim.sha256
              pnpm --package=@appthreat/caxa dlx caxa --input . --output "cdx-verify" -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/verify.js"
              chmod +x cdx-verify
              ./cdx-verify --version
              sha256sum cdx-verify > cdx-verify.sha256
              ./cdxgen --help
              ./cdxgen-slim --help
              ./cdx-verify --help
              mv cdxgen cdxgen-musl-arm64
              mv cdxgen.sha256 cdxgen-musl-arm64.sha256
              mv cdxgen-slim cdxgen-musl-arm64-slim
              mv cdxgen-slim.sha256 cdxgen-musl-arm64-slim.sha256
              mv cdx-verify cdx-musl-arm64-verify
              mv cdx-verify.sha256 cdx-musl-arm64-verify.sha256
            artifact: cdxgen-musl-arm64
            sartifact: cdxgen-musl-arm64-slim
            vartifact: cdx-musl-arm64-verify
    runs-on: ${{ matrix.os }}
    container:
      image: alpine:3.20
    permissions:
      contents: write  # needed to issue a GH release or uploading release assets
    steps:
      - name: Setup alpine builder
        run: |
          apk add --no-cache nodejs make python3 python3-dev py3-pip py3-virtualenv gcc g++ musl-dev npm git curl tar
      - name: Clone repo
        env:
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          REF: ${{ github.head_ref || github.ref }}
        run: |
          git clone --depth=1 --branch "v11.4.2" "$REPO_URL" .
          ls -lh
      - name: Install pnpm
        run: |
          npm install --global pnpm
          pnpm install --config.strict-dep-builds=true --virtual-store-dir node_modules/pnpm --prod --package-import-method copy --frozen-lockfile
      - name: Produce sae
        run: |
          ${{ matrix.build }}
        env:
          CDXGEN_DEBUG_MODE: debug
      - name: Release
        run: |
          ARCH=$(uname -m | sed 's/aarch64/arm64/' | sed 's/x86_64/amd64/')
          curl -sSL https://github.com/cli/cli/releases/download/v${GH_CLI_VERSION}/gh_${GH_CLI_VERSION}_linux_${ARCH}.tar.gz | tar xz -C /tmp
          mv /tmp/gh_${GH_CLI_VERSION}_linux_${ARCH}/bin/gh /usr/local/bin/
          chmod +x /usr/local/bin/gh
          gh release upload v11.4.2 ${{ matrix.artifact }} ${{ matrix.artifact }}.sha256 ${{ matrix.sartifact }} ${{ matrix.sartifact }}.sha256 ${{ matrix.vartifact }} ${{ matrix.vartifact }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
